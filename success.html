<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagamento completato — BetStorm</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌪️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#070a0f;color:#e8edf5;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(0,230,118,.12) 0%,transparent 70%);pointer-events:none}
.card{background:#0d1117;border:1px solid rgba(255,255,255,.07);border-radius:24px;padding:48px 40px;max-width:480px;width:100%;text-align:center;position:relative}
.icon{font-size:4rem;margin-bottom:16px}
h1{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;margin-bottom:12px}
.subtitle{color:#6b7a8d;margin-bottom:32px;line-height:1.6}
.plan-badge{display:inline-block;padding:8px 20px;border-radius:99px;font-weight:700;font-size:.9rem;margin-bottom:28px;background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3);color:#00e676}
.plan-badge.elite{background:rgba(255,215,0,.1);border-color:rgba(255,215,0,.3);color:#ffd700}
.features{text-align:left;background:rgba(255,255,255,.03);border-radius:14px;padding:20px 24px;margin-bottom:32px}
.feature-item{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:.9rem;border-bottom:1px solid rgba(255,255,255,.05)}
.feature-item:last-child{border-bottom:none}
.check{color:#00e676;font-weight:700;font-size:1rem;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;border:none;text-decoration:none;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#00e676,#00c853);color:#070a0f;width:100%;justify-content:center}
.btn-primary:hover{transform:translateY(-2px)}
.loading-dots{display:flex;gap:6px;justify-content:center;margin:20px 0}
.dot{width:8px;height:8px;border-radius:50%;background:#00e676;animation:bounce .8s infinite}
.dot:nth-child(2){animation-delay:.15s}
.dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:scale(.6)}40%{transform:scale(1)}}
.status-msg{font-size:.85rem;color:#6b7a8d;margin-bottom:16px;min-height:20px}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🎉</div>
  <h1>Pagamento completato!</h1>
  <p class="subtitle">Il tuo piano è stato attivato.<br>Benvenuto nella famiglia BetStorm.</p>
  <div class="plan-badge" id="plan-badge">⚡ Piano Pro attivato</div>
  <div class="loading-dots" id="loading-dots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
  <p class="status-msg" id="status-msg">Aggiornamento account in corso...</p>
  <div class="features">
    <div class="feature-item"><span class="check">✓</span> Analisi illimitate</div>
    <div class="feature-item"><span class="check">✓</span> Segnali avanzati</div>
    <div class="feature-item"><span class="check">✓</span> Statistiche complete</div>
    <div class="feature-item" id="extra-features"></div>
  </div>
  <a href="/dashboard.html" class="btn btn-primary" id="dash-btn">
    <span>Vai alla Dashboard</span> →
  </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL      = 'https://zvftggieqlxujjtotvwg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp2ZnRnZ2llcWx4dWpqdG90dndnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0OTQ3NjIsImV4cCI6MjA4NzA3MDc2Mn0.ZatmSARBUZpibKPTBNhpXj0c07Thzu8RvT4NjMR6lxg';
const { createClient } = window.supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const BS_KEY = 'betstorm_session';

function getSession() {
  try {
    const raw = localStorage.getItem(BS_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (!s?.user || Date.now() > s.expires_at) return null;
    return s;
  } catch(_) { return null; }
}

async function init() {
  const params = new URLSearchParams(window.location.search);
  const plan   = params.get('plan') || 'pro';

  // Update badge UI
  const badge = document.getElementById('plan-badge');
  const extra  = document.getElementById('extra-features');
  if (plan === 'elite') {
    badge.textContent = '👑 Piano Elite attivato';
    badge.className   = 'plan-badge elite';
    extra.innerHTML   = '<span class="check">✓</span> Segnali live in-play<br><span class="check" style="margin-left:0">✓</span> Supporto prioritario 24/7';
  } else {
    badge.textContent = '⚡ Piano Pro attivato';
    extra.innerHTML   = '<span class="check">✓</span> Combinata fino a 5 eventi';
  }

  // Try to update plan in Supabase
  const session = getSession();
  let userId = session?.user?.id;

  if (!userId) {
    try {
      const { data: { session: s } } = await sb.auth.getSession();
      userId = s?.user?.id;
    } catch(_) {}
  }

  if (userId) {
    try {
      await sb.from('profiles')
        .update({ plan, subscription_status: 'active', updated_at: new Date().toISOString() })
        .eq('id', userId);

      // Aggiorna anche la sessione locale
      if (session) {
        session.user.plan = plan;
        localStorage.setItem(BS_KEY, JSON.stringify(session));
      }

      document.getElementById('status-msg').textContent  = '✅ Account aggiornato con successo!';
      document.getElementById('loading-dots').style.display = 'none';
    } catch(e) {
      document.getElementById('status-msg').textContent = 'Piano attivato — aggiornamento automatico entro pochi minuti.';
      document.getElementById('loading-dots').style.display = 'none';
    }
  } else {
    document.getElementById('status-msg').textContent = 'Piano attivato — accedi per vedere le modifiche.';
    document.getElementById('loading-dots').style.display = 'none';
  }

  // Auto redirect after 4 seconds
  setTimeout(() => { window.location.href = '/dashboard.html'; }, 4000);
}

init();
</script>
</body>
</html>
