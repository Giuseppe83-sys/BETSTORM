<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog Pronostici Calcio AI — BetStorm</title>
<meta name="description" content="Pronostici calcio giornalieri generati da AI. Analisi Serie A, Champions League e altro con statistiche e probabilità.">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/logo.jpg">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#070a0f;--surface:#0d1117;--border:rgba(255,255,255,.06);--green:#00e676;--green2:#00c853;--gold:#ffd600;--muted:#8b949e;--text:#e6edf3}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--green);text-decoration:none}
a:hover{text-decoration:underline}
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:rgba(13,17,23,.95);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.logo{display:flex;align-items:center;gap:8px;font-family:'Syne',sans-serif;font-size:1.1rem;color:#fff}
.logo b{color:var(--green)}
.logo img{width:32px;height:32px;border-radius:8px}
.container{max-width:800px;margin:0 auto;padding:40px 24px}
h1{font-family:'Syne',sans-serif;font-size:2rem;margin-bottom:8px}
.subtitle{color:var(--muted);margin-bottom:40px}
.article-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:24px;transition:border-color .3s}
.article-card:hover{border-color:rgba(0,230,118,.2)}
.article-date{font-size:.78rem;color:var(--muted);margin-bottom:8px}
.article-title{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700;margin-bottom:12px}
.article-title a{color:var(--text)}
.article-title a:hover{color:var(--green)}
.article-meta{font-size:.85rem;color:var(--muted);margin-bottom:16px}
.article-excerpt{color:var(--muted);font-size:.92rem;line-height:1.6}
.article-full{display:none;line-height:1.7;font-size:.95rem}
.article-full h2{font-family:'Syne',sans-serif;font-size:1.1rem;color:var(--green);margin:20px 0 8px}
.article-full p{margin-bottom:12px;color:var(--text)}
.article-full details{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px}
.article-full summary{font-weight:600;cursor:pointer;color:var(--green)}
.read-more{display:inline-block;margin-top:12px;color:var(--green);font-weight:600;cursor:pointer;font-size:.88rem}
.loading{text-align:center;padding:60px;color:var(--muted)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
footer{text-align:center;padding:40px;color:var(--muted);font-size:.8rem;border-top:1px solid var(--border);margin-top:60px}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo"><img src="/logo.jpg" alt="BetStorm"><b>Bet</b>&nbsp;Storm</a>
  <div><a href="/" style="color:var(--muted)"><i class="fas fa-home"></i> Home</a></div>
</nav>

<div class="container">
  <h1><i class="fas fa-newspaper" style="color:var(--green);margin-right:12px"></i>Blog Pronostici</h1>
  <p class="subtitle">Analisi e pronostici calcio generati quotidianamente dalla nostra AI</p>

  <div id="articles-list">
    <div class="loading"><div class="spinner"></div><p>Caricamento articoli...</p></div>
  </div>
</div>

<footer>
  <p>&copy; 2026 BetStorm — Analisi AI per Scommesse Calcio</p>
  <p style="margin-top:8px">Il gioco puo causare dipendenza. Gioca responsabilmente.</p>
</footer>

<script>
const ARTICLES_URL = 'https://zvftggieqlxujjtotvwg.supabase.co/storage/v1/object/public/betstorm-data/articles.json';
const list = document.getElementById('articles-list');

fetch(ARTICLES_URL)
  .then(r => r.json())
  .then(data => {
    const articles = data.articles || [];
    if (!articles.length) {
      list.innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px">Nessun articolo ancora. Torna presto!</p>';
      return;
    }
    list.innerHTML = articles.map((a, i) => {
      const date = new Date(a.date).toLocaleDateString('it-IT', {day:'numeric',month:'long',year:'numeric'});
      const excerpt = a.meta_description || '';
      return '<div class="article-card">' +
        '<div class="article-date"><i class="fas fa-calendar"></i> ' + date + '</div>' +
        '<div class="article-title">' + a.title + '</div>' +
        '<div class="article-excerpt">' + excerpt + '</div>' +
        '<div class="article-full" id="article-' + i + '">' + a.content_html + '</div>' +
        '<span class="read-more" onclick="toggleArticle(' + i + ', this)"><i class="fas fa-chevron-down"></i> Leggi tutto</span>' +
      '</div>';
    }).join('');
  })
  .catch(() => {
    list.innerHTML = '<p style="color:#ff7043;text-align:center;padding:40px">Errore nel caricamento degli articoli.</p>';
  });

function toggleArticle(i, btn) {
  const el = document.getElementById('article-' + i);
  if (el.style.display === 'block') {
    el.style.display = 'none';
    btn.innerHTML = '<i class="fas fa-chevron-down"></i> Leggi tutto';
  } else {
    el.style.display = 'block';
    btn.innerHTML = '<i class="fas fa-chevron-up"></i> Chiudi';
  }
}
</script>
</body>
</html>
